spring.application.name=PermutApp
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/Usuario}
spring.datasource.username=${SUPABASE_DB_USER:ServicioPublicacion}
spring.datasource.password=${SUPABASE_DB_PASSWORD:ServicioPublicacion}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#spring.jpa.database=postgresql
#spring.sql.init.platform=postgres

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:1}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:0}

spring.jpa.generate-ddl=true

# Manejo de Errores 
spring.web.error.include-binding-errors=always
spring.web.error.include-message=always
server.error.include-stacktrace=never
server.error.include-exception=false

security.jwt.secret=${JWT_SECRET:change-me-local-secret-change-me-123456}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:19006,http://127.0.0.1:8081,http://127.0.0.1:19006}

server.port=5001

aws.region=${AWS_REGION:us-east-2}
identity.face-threshold=${IDENTITY_FACE_THRESHOLD:85}
identity.reviewer-emails=${IDENTITY_REVIEWER_EMAILS:}
services.notificacion.base-url=${SERVICIO_NOTIFICACIONES_BASE_URL:http://127.0.0.1:7002}
services.notificacion.internal-api-key=${INTERNAL_NOTIFICATION_API_KEY:change-me-internal-notification-key}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=12MB
server.tomcat.threads.max=${TOMCAT_MAX_THREADS:32}
server.tomcat.threads.min-spare=${TOMCAT_MIN_SPARE_THREADS:2}
