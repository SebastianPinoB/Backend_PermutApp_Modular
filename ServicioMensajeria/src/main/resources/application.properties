spring.application.name=ServicioMensajeria
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/Mensajeria}
spring.datasource.username=${SUPABASE_DB_USER:ServicioMensajeria}
spring.datasource.password=${SUPABASE_DB_PASSWORD:ServicioMensajeria}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:2}
spring.jpa.generate-ddl=true

spring.web.error.include-binding-errors=always
spring.web.error.include-message=always
server.error.include-stacktrace=never
server.error.include-exception=false

server.port=7001
services.usuario.base-url=${SERVICIO_USUARIOS_BASE_URL:http://127.0.0.1:5001}
services.publicacion.base-url=${SERVICIO_PUBLICACIONES_BASE_URL:http://127.0.0.1:6000}
services.producto.base-url=${SERVICIO_PRODUCTOS_BASE_URL:http://127.0.0.1:5050}
services.notificacion.base-url=${SERVICIO_NOTIFICACIONES_BASE_URL:http://127.0.0.1:7002}
services.notificacion.internal-api-key=${INTERNAL_NOTIFICATION_API_KEY:change-me-internal-notification-key}

security.jwt.secret=${JWT_SECRET:change-me-local-secret-change-me-123456}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:19006,http://127.0.0.1:8081,http://127.0.0.1:19006}
