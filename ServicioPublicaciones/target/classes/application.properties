spring.application.name=PermutApp

spring.datasource.url=jdbc:postgresql://localhost:5432/Publicaciones
spring.datasource.username=ServicioPublicacion
spring.datasource.password=ServicioPublicacion
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#spring.jpa.database=postgresql
#spring.sql.init.platform=postgres

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

spring.jpa.generate-ddl=true

# Manejo de Errores 
spring.web.error.include-binding-errors=always
spring.web.error.include-message=always

server.port=6000
services.usuario.base-url=${SERVICIO_USUARIOS_BASE_URL:http://127.0.0.1:5001}


security.jwt.secret=${JWT_SECRET:change-me-local-secret-change-me-123456}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:19006,http://127.0.0.1:8081,http://127.0.0.1:19006}
