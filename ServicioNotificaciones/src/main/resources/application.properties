spring.application.name=ServicioNotificaciones
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/Notificaciones}
spring.datasource.username=${SUPABASE_DB_USER:ServicioNotificaciones}
spring.datasource.password=${SUPABASE_DB_PASSWORD:ServicioNotificaciones}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:2}

server.port=7002
security.jwt.secret=${JWT_SECRET:change-me-local-secret-change-me-123456}
notifications.internal-api-key=${INTERNAL_NOTIFICATION_API_KEY:change-me-internal-notification-key}
notifications.expo.url=${EXPO_PUSH_URL:https://exp.host/--/api/v2/push/send}
notifications.vapid.public-key=${VAPID_PUBLIC_KEY:}
notifications.vapid.private-key=${VAPID_PRIVATE_KEY:}
notifications.vapid.subject=${VAPID_SUBJECT:mailto:soporte@permutapp.cl}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:19006,http://127.0.0.1:8081,http://127.0.0.1:19006}

spring.web.error.include-message=always
server.error.include-stacktrace=never
