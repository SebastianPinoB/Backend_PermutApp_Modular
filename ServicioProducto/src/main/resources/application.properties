#MODIFICAR LA CONFIGURACION DE LA BD

spring.application.name=PermutApp
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/Usuario}
spring.datasource.username=${SUPABASE_DB_USER:ServicioPublicacion}
spring.datasource.password=${SUPABASE_DB_PASSWORD:ServicioPublicacion}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#spring.jpa.database=postgresql
#spring.sql.init.platform=postgres

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:5}

spring.jpa.generate-ddl=true

# Manejo de Errores 
spring.web.error.include-binding-errors=always
spring.web.error.include-message=always

server.port = 5001
