spring.application.name=ServicioLocalizacion
spring.config.import=optional:file:.env[.properties]

spring.web.error.include-binding-errors=always
spring.web.error.include-message=always

spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${SUPABASE_DB_USER:postgres.ohgjjqqjclcoaqreqmyf}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:2}

server.port=${SERVER_PORT:5002}

springdoc.swagger-ui.path=/localizacion.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operations-sorter=alpha
